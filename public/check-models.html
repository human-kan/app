<!DOCTYPE html>
<html>
<head>
    <title>Gemini API Model Checker</title>
    <style>
        body { font-family: sans-serif; background: #0f1115; color: white; padding: 40px; }
        pre { background: #171921; padding: 20px; border-radius: 8px; border: 1px solid #333; overflow: auto; }
        .success { color: #22c55e; }
        .error { color: #ef4444; }
    </style>
</head>
<body>
    <h1>Gemini API Diagnostic</h1>
    <div id="status">Checking models...</div>
    <h2>Available Models:</h2>
    <pre id="output">Loading...</pre>

    <script>
        const API_KEY = 'AIzaSyAFiM13NFCk1IFFNN1_1lPOD00a-F3Aet8';
        
        async function checkModels() {
            const output = document.getElementById('output');
            const status = document.getElementById('status');
            
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1/models?key=${API_KEY}`);
                const data = await response.json();
                
                if (response.ok) {
                    status.innerHTML = '<span class="success">Connection Successful!</span>';
                    output.textContent = JSON.stringify(data, null, 2);
                    console.log('Available Models:', data);
                } else {
                    status.innerHTML = '<span class="error">API Error</span>';
                    output.textContent = JSON.stringify(data, null, 2);
                }
            } catch (err) {
                status.innerHTML = '<span class="error">Network Error</span>';
                output.textContent = err.message;
            }
        }
        
        checkModels();
    </script>
</body>
</html>
